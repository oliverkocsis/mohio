<h1>Product Backlog Item List</h1>
<table mat-table [dataSource]="productBacklogItemList">

    <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef> Description </th>
        <td mat-cell *matCellDef="let productBacklogItem"> {{productBacklogItem.description}} </td>
    </ng-container>
    <ng-container matColumnDef="order">
        <th mat-header-cell *matHeaderCellDef width="75px" style="text-align: right;"> Order </th>
        <td mat-cell *matCellDef="let productBacklogItem" style="text-align: right;"> {{productBacklogItem.order}} </td>
    </ng-container>
    <ng-container matColumnDef="estimate">
        <th mat-header-cell *matHeaderCellDef width="75px" style="text-align: right;"> Estimate </th>
        <td mat-cell *matCellDef="let productBacklogItem" style="text-align: right;"> {{productBacklogItem.estimate}} </td>
    </ng-container>
    <ng-container matColumnDef="value">
        <th mat-header-cell *matHeaderCellDef width="75px" style="text-align: right;"> Value </th>
        <td mat-cell *matCellDef="let productBacklogItem" style="text-align: right;"> {{productBacklogItem.value}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let productBacklogItem; columns: displayedColumns;"></tr>
</table>
